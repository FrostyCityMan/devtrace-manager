<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('WBS 관리')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="dt-page">
    <section class="dt-hero">
        <div>
            <h1>WBS 관리</h1>
            <p>프로젝트 산출물과 작업을 계층 구조로 관리하고, 이슈·공수·일정의 기준 데이터를 구성합니다.</p>
        </div>
        <div class="dt-hero-actions">
            <a th:href="@{/wbs/new(projectId=${condition.projectId})}" class="dt-button dt-button-primary">작업 등록</a>
            <a th:href="@{/wbs/gantt(projectId=${condition.projectId})}" class="dt-button dt-button-ghost">Gantt</a>
        </div>
    </section>

    <form th:action="@{/wbs}" method="get" th:object="${condition}" class="dt-toolbar dt-wbs-toolbar">
        <div class="dt-search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/></svg>
            <input type="search" th:field="*{keyword}" placeholder="WBS 코드, 작업명, 이슈 검색">
        </div>
        <div class="dt-select-box">
            <select th:field="*{projectId}">
                <option value="">전체 프로젝트</option>
                <option th:each="project : ${projects}"
                        th:value="${project.projectId}"
                        th:text="${project.projectCode + ' - ' + project.projectName}"></option>
            </select>
        </div>
        <div class="dt-select-box">
            <select th:field="*{taskType}">
                <option value="">전체 유형</option>
                <option th:each="taskType : ${taskTypes}" th:value="${taskType}" th:text="${taskType.label}"></option>
            </select>
        </div>
        <div class="dt-select-box">
            <select th:field="*{status}">
                <option value="">전체 상태</option>
                <option th:each="status : ${taskStatuses}" th:value="${status}" th:text="${status.label}"></option>
            </select>
        </div>
        <button type="submit" class="dt-filter-button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
            조회
        </button>
        <a th:href="@{/wbs}" class="dt-reset-button">초기화</a>
    </form>

    <section class="dt-table-card">
        <div class="dt-table-scroll">
            <table class="dt-dashboard-table dt-wbs-table">
                <thead>
                <tr>
                    <th>WBS</th>
                    <th>작업명</th>
                    <th>유형</th>
                    <th>상태</th>
                    <th>이슈</th>
                    <th>계획 기간</th>
                    <th>공수</th>
                    <th>진행률</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tasks)}">
                    <td colspan="9" data-label="WBS">등록된 WBS 작업이 없습니다.</td>
                </tr>
                <tr th:each="task : ${tasks}" class="stripe-teal">
                    <td data-label="WBS" th:text="${task.wbsCode}">1.1</td>
                    <td data-label="작업명">
                        <span class="dt-wbs-tree-name" th:style="${'padding-left:' + task.indentPx + 'px'}" th:text="${task.taskName}">요구사항 분석</span>
                    </td>
                    <td data-label="유형" th:text="${task.taskType.label}">작업</td>
                    <td data-label="상태">
                        <span class="dt-status" th:classappend="${task.status.cssClass}" th:text="${task.status.label}">대기</span>
                    </td>
                    <td data-label="이슈" th:text="${task.issueKey == null ? '-' : task.issueKey}">DTR-101</td>
                    <td data-label="계획 기간" th:text="${task.planStartDate + ' ~ ' + task.planEndDate}">2026-05-01 ~ 2026-05-07</td>
                    <td data-label="공수" th:text="${task.spentHoursText + ' / ' + task.estimatedHoursText}">0.0h / 0.0h</td>
                    <td data-label="진행률" th:text="${task.progressRate + '%'}">0%</td>
                    <td data-label="작업">
                        <div class="dt-row-actions">
                            <a th:href="@{/wbs/{wbsTaskId}(wbsTaskId=${task.wbsTaskId})}" class="dt-action">상세</a>
                            <a th:href="@{/wbs/{wbsTaskId}/edit(wbsTaskId=${task.wbsTaskId})}" class="dt-action">수정</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
