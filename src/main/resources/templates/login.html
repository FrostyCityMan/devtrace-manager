<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('로그인')}"></head>
<body class="dt-login-body">
<main class="dt-login-shell">
    <section class="dt-login-intro" aria-label="DevTrace Manager 소개">
        <a class="dt-login-brand" th:href="@{/login}" aria-label="DevTrace Manager 로그인">
            <span class="dt-brand-symbol" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span class="dt-brand-text"><strong>DevTrace</strong> Manager</span>
        </a>

        <div class="dt-login-copy">
            <h1>프로젝트 흐름을<br>한 화면에서 추적하세요</h1>
            <p>일정, 상태, 고객사, 작업 히스토리를 정돈된 대시보드에서 빠르게 확인합니다.</p>
        </div>

        <div class="dt-login-preview" aria-hidden="true">
            <div class="dt-preview-top">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="dt-preview-stats">
                <div><strong>28</strong><small>전체 프로젝트</small></div>
                <div><strong>12</strong><small>진행 중</small></div>
                <div><strong>8</strong><small>완료</small></div>
            </div>
            <div class="dt-preview-row teal"></div>
            <div class="dt-preview-row blue"></div>
            <div class="dt-preview-row amber"></div>
        </div>
    </section>

    <section class="dt-login-card" aria-label="로그인">
        <div class="dt-login-card-head">
            <h2>로그인</h2>
            <p>관리자 계정으로 접속해 프로젝트 보드를 확인하세요.</p>
        </div>

        <div th:if="${param.error}" class="dt-login-alert error">아이디 또는 비밀번호를 확인해주세요.</div>
        <div th:if="${param.logout}" class="dt-login-alert success">정상적으로 로그아웃되었습니다.</div>

        <form th:action="@{/login}" method="post" class="dt-login-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                <span>아이디</span>
                <input type="text" name="username" placeholder="아이디 입력" autocomplete="username" required autofocus>
            </label>
            <label>
                <span>비밀번호</span>
                <input type="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
            </label>
            <div class="dt-login-options">
                <label class="dt-check">
                    <input type="checkbox" name="remember-me">
                    <span>로그인 유지</span>
                </label>
                <span>Secure Access</span>
            </div>
            <button type="submit" class="dt-login-submit">로그인</button>
        </form>
    </section>
</main>
</body>
</html>
