<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${issueId == null ? '이슈 등록' : '이슈 수정'})}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="dt-page">
    <section class="dt-hero">
        <div>
            <h1 th:text="${issueId == null ? '이슈 등록' : '이슈 수정'}">이슈 등록</h1>
            <p>프로젝트 단위로 업무, 결함, 문서, 배포 작업을 추적합니다.</p>
        </div>
        <a th:href="@{/issues}" class="dt-button dt-button-ghost">목록</a>
    </section>

    <section class="dt-panel dt-form-panel">
        <form th:action="${issueId == null ? '/issues' : '/issues/' + issueId}" th:object="${issue}" method="post" class="dt-form">
            <div class="dt-form-grid">
                <div class="dt-field">
                    <label for="projectId">프로젝트</label>
                    <select id="projectId" th:field="*{projectId}" class="form-select" required>
                        <option value="">프로젝트 선택</option>
                        <option th:each="project : ${projects}"
                                th:value="${project.projectId}"
                                th:text="${project.projectCode + ' - ' + project.projectName}"></option>
                    </select>
                    <div class="dt-error" th:errors="*{projectId}"></div>
                </div>
                <div class="dt-field">
                    <label for="issueKey">이슈 키</label>
                    <input id="issueKey" type="text" th:field="*{issueKey}" class="form-control" maxlength="50" required>
                    <div class="dt-error" th:errors="*{issueKey}"></div>
                </div>
                <div class="dt-field">
                    <label for="issueType">유형</label>
                    <select id="issueType" th:field="*{issueType}" class="form-select" required>
                        <option th:each="type : ${issueTypes}" th:value="${type}" th:text="${type.label}"></option>
                    </select>
                    <div class="dt-error" th:errors="*{issueType}"></div>
                </div>
                <div class="dt-field">
                    <label for="status">상태</label>
                    <select id="status" th:field="*{status}" class="form-select" required>
                        <option th:each="status : ${issueStatuses}" th:value="${status}" th:text="${status.label}"></option>
                    </select>
                    <div class="dt-error" th:errors="*{status}"></div>
                </div>
                <div class="dt-field dt-field-wide">
                    <label for="title">제목</label>
                    <input id="title" type="text" th:field="*{title}" class="form-control" maxlength="500" required>
                    <div class="dt-error" th:errors="*{title}"></div>
                </div>
                <div class="dt-field">
                    <label for="priority">우선순위</label>
                    <select id="priority" th:field="*{priority}" class="form-select" required>
                        <option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority.label}"></option>
                    </select>
                    <div class="dt-error" th:errors="*{priority}"></div>
                </div>
                <div class="dt-field">
                    <label for="estimatedMinutes">예상 공수(분)</label>
                    <input id="estimatedMinutes" type="number" th:field="*{estimatedMinutes}" class="form-control" min="0">
                    <div class="dt-error" th:errors="*{estimatedMinutes}"></div>
                </div>
                <div class="dt-field">
                    <label for="startDate">시작 예정일</label>
                    <input id="startDate" type="date" th:field="*{startDate}" class="form-control">
                </div>
                <div class="dt-field">
                    <label for="dueDate">완료 예정일</label>
                    <input id="dueDate" type="date" th:field="*{dueDate}" class="form-control">
                </div>
                <div class="dt-field">
                    <label for="resolvedDate">실제 완료일</label>
                    <input id="resolvedDate" type="date" th:field="*{resolvedDate}" class="form-control">
                </div>
                <div class="dt-field">
                    <label for="assigneeId">담당자 ID</label>
                    <input id="assigneeId" type="text" th:field="*{assigneeId}" class="form-control" placeholder="UUID">
                    <div class="dt-error" th:errors="*{assigneeId}"></div>
                </div>
                <div class="dt-field">
                    <label for="reporterId">요청자 ID</label>
                    <input id="reporterId" type="text" th:field="*{reporterId}" class="form-control" placeholder="UUID">
                    <div class="dt-error" th:errors="*{reporterId}"></div>
                </div>
                <div class="dt-field dt-field-wide">
                    <label for="description">설명</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="6"></textarea>
                </div>
            </div>
            <div class="dt-form-actions">
                <button type="submit" class="dt-button dt-button-primary">저장</button>
                <a th:href="@{/issues}" class="dt-button dt-button-ghost">취소</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
