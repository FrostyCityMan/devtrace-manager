<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">DevTrace Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<nav th:fragment="nav" class="dt-chrome" aria-label="주요 탐색" th:with="path=${currentPath}">
    <aside class="dt-sidebar">
        <a class="dt-brand" th:href="@{/dashboard}" aria-label="DevTrace Manager 홈">
            <span class="dt-brand-symbol" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span class="dt-brand-text"><strong>DevTrace</strong> Manager</span>
        </a>

        <div class="dt-nav-list">
            <a class="dt-nav-item" th:href="@{/dashboard}" title="대시보드"
               th:classappend="${path == null or path == '/' or path == '/dashboard' ? ' active' : ''}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
                <span class="dt-nav-text">대시보드</span>
            </a>

            <div class="dt-nav-group">
                <span class="dt-nav-label">업무 운영</span>
                <a class="dt-nav-item" th:href="@{/projects}" title="프로젝트"
                   th:classappend="${path != null and #strings.startsWith(path, '/projects') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5h7l2 2H21v10.5H3z"/></svg>
                    <span class="dt-nav-text">프로젝트</span>
                </a>
                <a class="dt-nav-item" th:href="@{/issues}" title="이슈"
                   th:classappend="${path != null and (#strings.startsWith(path, '/issues') or #strings.startsWith(path, '/work-logs')) ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v3M12 18v3M4.8 4.8l2.1 2.1M17.1 17.1l2.1 2.1M3 12h3M18 12h3M4.8 19.2l2.1-2.1M17.1 6.9l2.1-2.1M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0z"/></svg>
                    <span class="dt-nav-text">이슈</span>
                </a>
                <a class="dt-nav-item" th:href="@{/sprints}" title="스프린트"
                   th:classappend="${path != null and #strings.startsWith(path, '/sprints') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h10M8 5v14M16 5v7"/></svg>
                    <span class="dt-nav-text">스프린트</span>
                </a>
                <a class="dt-nav-item" th:href="@{/boards}" title="칸반"
                   th:classappend="${path != null and #strings.startsWith(path, '/boards') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h6v14H4zM14 5h6v7h-6zM14 16h6v3h-6z"/></svg>
                    <span class="dt-nav-text">칸반</span>
                </a>
                <a class="dt-nav-item" th:href="@{/wbs}" title="WBS/Gantt"
                   th:classappend="${path != null and #strings.startsWith(path, '/wbs') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h6v6H4zM14 5h6v6h-6zM4 15h6v4H4zM14 15h6v4h-6zM10 8h4M10 17h4"/></svg>
                    <span class="dt-nav-text">WBS/Gantt</span>
                </a>
            </div>

            <div class="dt-nav-group">
                <span class="dt-nav-label">산출물</span>
                <a class="dt-nav-item" th:href="@{/artifacts}" title="산출물"
                   th:classappend="${path != null and #strings.startsWith(path, '/artifacts') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9l3 3v15H6zM15 3v4h4M9 12h6M9 16h6"/></svg>
                    <span class="dt-nav-text">산출물</span>
                </a>
                <a class="dt-nav-item" th:href="@{/column-specs}" title="컬럼명세"
                   th:classappend="${path != null and #strings.startsWith(path, '/column-specs') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V9M10 20V4M15 20v-7M20 20V7"/></svg>
                    <span class="dt-nav-text">컬럼명세</span>
                </a>
                <a class="dt-nav-item" th:href="@{/vcs-logs}" title="변경이력"
                   th:classappend="${path != null and #strings.startsWith(path, '/vcs-logs') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4v16M18 4v16M6 8h5a3 3 0 0 1 3 3v2a3 3 0 0 0 3 3h1"/></svg>
                    <span class="dt-nav-text">변경이력</span>
                </a>
                <a class="dt-nav-item" th:href="@{/test-evidences}" title="테스트 증적"
                   th:classappend="${path != null and #strings.startsWith(path, '/test-evidences') ? ' active' : ''}">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l2 2 4-4M5 4h14v16H5zM8 4V2M16 4V2"/></svg>
                    <span class="dt-nav-text">테스트 증적</span>
                </a>
            </div>
        </div>

        <button type="button" class="dt-collapse" aria-expanded="true" aria-label="사이드바 접기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg>
            <span>메뉴 접기</span>
        </button>
    </aside>

    <header class="dt-topbar">
        <button type="button" class="dt-icon-button" aria-label="메뉴">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <div class="dt-top-actions">
            <button type="button" class="dt-icon-button dt-bell" aria-label="알림">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
                <span>3</span>
            </button>
            <form th:action="@{/logout}" method="post" class="dt-user-menu">
                <button type="submit" aria-label="관리자 메뉴">
                    <span class="dt-avatar">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0"/></svg>
                    </span>
                    관리자
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5"/></svg>
                </button>
            </form>
        </div>
    </header>
    <script>
        $(function () {
            $('.dt-collapse').on('click', function () {
                var chrome = $('.dt-chrome');
                var compact = !chrome.hasClass('is-compact');
                chrome.toggleClass('is-compact', compact);
                $(this).attr('aria-expanded', String(!compact));
                $(this).attr('aria-label', compact ? '사이드바 펼치기' : '사이드바 접기');
                $(this).find('span').text(compact ? '메뉴 펼치기' : '메뉴 접기');
            });
        });
    </script>
</nav>
</body>
</html>
