<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">DevTrace Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<nav th:fragment="nav" class="dt-chrome" aria-label="주요 탐색">
    <aside class="dt-sidebar">
        <a class="dt-brand" th:href="@{/projects}" aria-label="DevTrace Manager 홈">
            <span class="dt-brand-symbol" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span class="dt-brand-text"><strong>DevTrace</strong> Manager</span>
        </a>

        <div class="dt-nav-list">
            <a class="dt-nav-item active" th:href="@{/projects}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
                대시보드
            </a>
            <a class="dt-nav-item" th:href="@{/projects}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5h7l2 2H21v10.5H3z"/></svg>
                프로젝트
            </a>
            <a class="dt-nav-item" href="#">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v16H5zM8 12l2 2 5-5"/></svg>
                업무
            </a>
            <a class="dt-nav-item" th:href="@{/issues}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v3M12 18v3M4.8 4.8l2.1 2.1M17.1 17.1l2.1 2.1M3 12h3M18 12h3M4.8 19.2l2.1-2.1M17.1 6.9l2.1-2.1M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0z"/></svg>
                이슈
            </a>
            <a class="dt-nav-item" href="#">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v4M18 3v4M4 8h16M5 5h14v16H5z"/></svg>
                일정
            </a>
            <a class="dt-nav-item" th:href="@{/column-specs}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V9M10 20V4M15 20v-7M20 20V7"/></svg>
                컬럼명세
            </a>
            <a class="dt-nav-item" th:href="@{/vcs-logs}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4v16M18 4v16M6 8h5a3 3 0 0 1 3 3v2a3 3 0 0 0 3 3h1"/></svg>
                변경이력
            </a>
            <a class="dt-nav-item" href="#">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 11a4 4 0 1 1 8 0M3 21a7 7 0 0 1 10-6.3M16 14a5 5 0 0 1 5 5v2"/></svg>
                사용자
            </a>
            <a class="dt-nav-item" href="#">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM4 12l-2-1 2-4 2 1M20 12l2-1-2-4-2 1M12 4l1-2h-2zM12 20l1 2h-2z"/></svg>
                설정
            </a>
        </div>

        <button type="button" class="dt-collapse">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg>
            메뉴 접기
        </button>
    </aside>

    <header class="dt-topbar">
        <button type="button" class="dt-icon-button" aria-label="메뉴">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <div class="dt-top-actions">
            <button type="button" class="dt-icon-button dt-bell" aria-label="알림">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
                <span>3</span>
            </button>
            <form th:action="@{/logout}" method="post" class="dt-user-menu">
                <button type="submit" aria-label="관리자 메뉴">
                    <span class="dt-avatar">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0"/></svg>
                    </span>
                    관리자
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5"/></svg>
                </button>
            </form>
        </div>
    </header>
</nav>
</body>
</html>
