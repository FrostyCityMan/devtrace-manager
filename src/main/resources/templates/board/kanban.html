<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('칸반 보드')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="dt-content dt-board-page">
    <input type="hidden" id="csrfToken" th:value="${_csrf.token}">
    <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}">

    <section class="dt-page-head">
        <div>
            <h1>칸반 보드</h1>
            <p class="dt-page-desc">프로젝트별 이슈 흐름을 상태 컬럼으로 운영합니다.</p>
        </div>
        <a th:href="@{/issues/new}" class="dt-primary-button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            새 이슈
        </a>
    </section>

    <form th:action="@{/boards}" method="get" class="dt-toolbar dt-board-toolbar" aria-label="칸반 보드 필터">
        <label class="dt-search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/></svg>
            <input type="search" name="keyword" th:value="${condition.keyword}" placeholder="이슈 키, 제목, 프로젝트">
        </label>
        <label class="dt-select-box">
            <select name="projectId">
                <option value="">전체 프로젝트</option>
                <option th:each="project : ${projects}"
                        th:value="${project.projectId}"
                        th:selected="${condition.projectId != null and condition.projectId.equals(project.projectId)}"
                        th:text="${project.projectCode + ' - ' + project.projectName}"></option>
            </select>
        </label>
        <label class="dt-select-box">
            <select name="assigneeId">
                <option value="">전체 담당자</option>
                <option th:each="assignee : ${assignees}"
                        th:value="${assignee.assigneeId}"
                        th:selected="${condition.assigneeId != null and condition.assigneeId.equals(assignee.assigneeId)}"
                        th:text="${assignee.assigneeName}"></option>
            </select>
        </label>
        <label class="dt-select-box">
            <select name="priority">
                <option value="">전체 우선순위</option>
                <option th:each="priority : ${priorities}"
                        th:value="${priority}"
                        th:selected="${condition.priority == priority}"
                        th:text="${priority.label}"></option>
            </select>
        </label>
        <button type="submit" class="dt-filter-button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4M8 6v3M16 12v3"/></svg>
            조회
        </button>
        <a th:href="@{/boards}" class="dt-reset-button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 1 0 2.3-5.7M4 4v6h6"/></svg>
            초기화
        </a>
    </form>

    <section class="dt-board-summary" aria-label="칸반 보드 현황">
        <article>
            <span>전체 이슈</span>
            <strong th:text="${summary.totalCount}">0</strong>
            <small>건</small>
        </article>
        <article>
            <span>진행 중</span>
            <strong th:text="${summary.activeCount}">0</strong>
            <small>건</small>
        </article>
        <article>
            <span>완료</span>
            <strong th:text="${summary.doneCount}">0</strong>
            <small>건</small>
        </article>
        <article>
            <span>지연</span>
            <strong th:text="${summary.delayedCount}">0</strong>
            <small>건</small>
        </article>
        <article>
            <span>미지정</span>
            <strong th:text="${summary.unassignedCount}">0</strong>
            <small>건</small>
        </article>
    </section>

    <div id="boardStatusMessage" class="dt-board-message" role="status" aria-live="polite"></div>

    <section class="dt-board" aria-label="칸반 보드">
        <article th:each="column : ${columns}"
                 class="dt-board-column"
                 th:attr="data-status=${column.status}">
            <header class="dt-board-column-head">
                <div>
                    <strong th:text="${column.statusLabel}">등록</strong>
                    <span th:text="${column.issueCount + '건'}">0건</span>
                </div>
                <small>상태 컬럼</small>
            </header>

            <div class="dt-board-dropzone">
                <div th:if="${#lists.isEmpty(column.issues)}" class="dt-board-empty">표시할 이슈가 없습니다.</div>
                <article th:each="card : ${column.issues}"
                         class="dt-board-card"
                         draggable="true"
                         th:classappend="${card.delayed ? ' delayed' : ''}"
                         th:attr="data-issue-id=${card.issueId},data-current-status=${card.status}">
                    <a th:href="@{/issues/{issueId}(issueId=${card.issueId})}" class="dt-board-card-link">
                        <div class="dt-board-card-top">
                            <span th:text="${card.issueKey}">DTR-001</span>
                            <span class="dt-chip"
                                  th:classappend="${card.priority == null ? '' : ' ' + card.priority.cssClass}"
                                  th:text="${card.priority == null ? '-' : card.priority.label}">보통</span>
                        </div>
                        <h2 th:text="${card.title}">이슈 제목</h2>
                        <div class="dt-board-card-meta">
                            <span th:text="${card.projectCode + ' / ' + (card.issueType == null ? '-' : card.issueType.label)}">DTR / 기능</span>
                            <span th:text="${card.assigneeDisplayName}">Unassigned</span>
                        </div>
                        <div class="dt-board-card-effort">
                            <span th:text="${card.dueDate == null ? '예정일 없음' : card.dueDate}">2026-05-06</span>
                            <strong th:text="${card.spentHoursLabel + ' / ' + card.estimatedHoursLabel}">0h / 0h</strong>
                        </div>
                        <div th:if="${card.delayed}" class="dt-board-risk">지연</div>
                    </a>
                    <div class="dt-board-card-control">
                        <select class="dt-board-status-select"
                                aria-label="이슈 상태 이동"
                                th:attr="data-issue-id=${card.issueId},data-current-status=${card.status}">
                            <option th:each="status : ${boardStatuses}"
                                    th:value="${status}"
                                    th:selected="${status == card.status}"
                                    th:text="${status.label}">상태</option>
                        </select>
                    </div>
                </article>
            </div>
        </article>
    </section>
</main>
<script th:inline="javascript">
    const updateBoardStatusUrl = /*[[@{/api/v1/boards/status}]]*/ "/api/v1/boards/status";
    const csrfToken = document.getElementById("csrfToken")?.value;
    const csrfHeader = document.getElementById("csrfHeader")?.value;
    const boardStatusMessage = document.getElementById("boardStatusMessage");
    let draggedCard = null;

    function setBoardMessage(message, isError = false) {
        if (!boardStatusMessage) {
            return;
        }
        boardStatusMessage.textContent = message;
        boardStatusMessage.classList.toggle("error", isError);
        boardStatusMessage.classList.toggle("visible", Boolean(message));
    }

    async function updateIssueStatus(issueId, status) {
        const headers = {"Content-Type": "application/json"};
        if (csrfHeader && csrfToken) {
            headers[csrfHeader] = csrfToken;
        }

        const response = await fetch(updateBoardStatusUrl, {
            method: "PATCH",
            headers,
            body: JSON.stringify({issueId, status})
        });

        if (!response.ok) {
            throw new Error("status update failed");
        }
    }

    document.querySelectorAll(".dt-board-card").forEach((card) => {
        card.addEventListener("dragstart", () => {
            draggedCard = card;
            card.classList.add("dragging");
        });
        card.addEventListener("dragend", () => {
            card.classList.remove("dragging");
            draggedCard = null;
        });
    });

    document.querySelectorAll(".dt-board-column").forEach((column) => {
        column.addEventListener("dragover", (event) => {
            event.preventDefault();
            column.classList.add("drag-over");
        });
        column.addEventListener("dragleave", () => {
            column.classList.remove("drag-over");
        });
        column.addEventListener("drop", async (event) => {
            event.preventDefault();
            column.classList.remove("drag-over");
            if (!draggedCard) {
                return;
            }

            const issueId = draggedCard.dataset.issueId;
            const status = column.dataset.status;
            if (!issueId || !status || draggedCard.dataset.currentStatus === status) {
                return;
            }

            setBoardMessage("이슈 상태를 변경하는 중입니다.");
            try {
                await updateIssueStatus(issueId, status);
            } catch (error) {
                setBoardMessage("이슈 상태 변경에 실패했습니다.", true);
                return;
            }
            window.location.reload();
        });
    });

    document.querySelectorAll(".dt-board-status-select").forEach((select) => {
        select.addEventListener("dragstart", (event) => event.stopPropagation());
        select.addEventListener("mousedown", (event) => event.stopPropagation());
        select.addEventListener("change", async () => {
            const issueId = select.dataset.issueId;
            const previousStatus = select.dataset.currentStatus;
            const nextStatus = select.value;
            if (!issueId || !nextStatus || previousStatus === nextStatus) {
                return;
            }

            select.disabled = true;
            setBoardMessage("이슈 상태를 변경하는 중입니다.");
            try {
                await updateIssueStatus(issueId, nextStatus);
                window.location.reload();
            } catch (error) {
                select.value = previousStatus;
                select.disabled = false;
                setBoardMessage("이슈 상태 변경에 실패했습니다.", true);
            }
        });
    });
</script>
</body>
</html>
